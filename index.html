<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stally Website - Preview</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #ffffff;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <iframe
      title="Stally Website Preview"
      src="Stally%20Website%20%E2%80%93%20Figma%20Make_files/a_002_HheW.html"
    ></iframe>
    <script>
      (() => {
        const CONTACT_PHONE = "+84907930205";
        const CONTACT_TEXT = ["liên hệ", "lien he", "contact", "gọi", "goi", "tư vấn", "tu van"];

        const normalize = (value) =>
          String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase();

        const isContactTarget = (element) => {
          const text = normalize(element?.innerText || element?.textContent || "");
          return CONTACT_TEXT.some((keyword) => text.includes(normalize(keyword)));
        };

        const wireContactCalls = () => {
          const iframe = document.querySelector("iframe");
          const frameDocument = iframe?.contentDocument;
          if (!frameDocument || frameDocument.__stallyContactCallWired) return;

          frameDocument.__stallyContactCallWired = true;
          frameDocument.addEventListener(
            "click",
            (event) => {
              const path = event.composedPath ? event.composedPath() : [];
              const target = path.find((node) => node?.nodeType === 1 && isContactTarget(node));
              if (!target) return;

              event.preventDefault();
              event.stopPropagation();
              window.location.href = `tel:${CONTACT_PHONE}`;
            },
            true
          );
        };

        document.querySelector("iframe")?.addEventListener("load", wireContactCalls);
        window.addEventListener("load", wireContactCalls);
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stally</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #ffffff;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <iframe
      title="Stally Website Preview"
      src="Stally%20Website%20%E2%80%93%20Figma%20Make_files/a_002_HheW.html"
    ></iframe>
    <script>
      (() => {
        const CONTACT_PHONE = "+84941205852";
        const SITE = "website";

        const normalize = (value) =>
          String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/đ/g, "d")
            .replace(/Đ/g, "d")
            .toLowerCase()
            .replace(/\s+/g, " ")
            .trim();

        const clickText = (element) => normalize(element?.innerText || element?.textContent || "");

        const targetForWebsite = (text) => {
          if (text.includes("trang chu") || text === "stally") return "home";
          if (text.includes("ve stally") || text.includes("stally lam gi")) return "about";
          if (text.includes("san pham") || text.includes("bang gia")) return "products";
          if (text.includes("demo") || text.includes("lien he") || text.includes("tu van")) return "contact";
          return "";
        };

        const targetForLanding = (text) => {
          if (text.includes("van de")) return "van-de";
          if (text.includes("giai phap")) return "giai-phap";
          if (text.includes("tinh nang")) return "tinh-nang";
          if (text.includes("cach hoat dong")) return "cach-hoat-dong";
          if (text.includes("bang gia")) return "bang-gia";
          if (text === "demo" || text.includes("dat lich demo")) return "demo";
          if (text.includes("lien he") || text.includes("early access") || text.includes("dang ky") || text.includes("tham gia") || text.includes("dung thu")) return "lien-he";
          return "";
        };

        const targetFromText = (text) => SITE === "landing" ? targetForLanding(text) : targetForWebsite(text);

        const shouldCall = (text, inNavOrFooter) => {
          if (inNavOrFooter) return false;
          return text.includes("lien he tu van") || text.includes("tu van") || text === "lien he";
        };

        const scrollFrameTo = (frameDocument, id) => {
          const target = frameDocument.getElementById(id);
          if (!target) return false;
          frameDocument.documentElement.style.scrollBehavior = "smooth";
          frameDocument.documentElement.style.overflowY = "auto";
          frameDocument.body.style.overflowY = "auto";
          target.style.scrollMarginTop = "88px";
          target.scrollIntoView({ behavior: "smooth", block: "start" });
          return true;
        };

        const wireInteractions = () => {
          const iframe = document.querySelector("iframe");
          const frameDocument = iframe?.contentDocument;
          if (!frameDocument || frameDocument.__stallyInteractionsWired) return;

          frameDocument.__stallyInteractionsWired = true;
          frameDocument.addEventListener(
            "click",
            (event) => {
              const path = event.composedPath ? event.composedPath() : [];
              const clickable = path.find((node) =>
                node?.nodeType === 1 && (node.tagName === "BUTTON" || node.tagName === "A")
              );
              if (!clickable) return;

              const text = clickText(clickable);
              const inNavOrFooter = Boolean(clickable.closest("nav, footer"));

              if (SITE === "website" && text.includes("procurs")) {
                event.preventDefault();
                event.stopPropagation();
                window.location.href = "/procurS/";
                return;
              }

              const target = targetFromText(text);

              if (shouldCall(text, inNavOrFooter)) {
                event.preventDefault();
                event.stopPropagation();
                window.location.href = `tel:${CONTACT_PHONE}`;
                return;
              }

              if (target && scrollFrameTo(frameDocument, target)) {
                event.preventDefault();
                event.stopPropagation();
              }
            },
            true
          );
        };

        document.querySelector("iframe")?.addEventListener("load", wireInteractions);
        window.addEventListener("load", wireInteractions);
      })();
    </script>
  </body>
</html>
